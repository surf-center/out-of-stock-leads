    body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
    .modal-backdrop { background: rgba(0,0,0,0.5); }
    .placeholder-chip { display: inline-flex; align-items: center; border: 1px solid #d1d5db; background: white; color: #111827; font-size: 11px; font-weight: 700; border-radius: 9999px; padding: 5px 10px; cursor: pointer; transition: 0.15s ease; }
    .placeholder-chip:hover { background: #ecfeff; border-color: #06b6d4; color: #0f766e; }
    textarea { resize: vertical; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; cursor: pointer; background-color: #d1d5db; transition: .2s; border-radius: 9999px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; top: 3px; background-color: white; transition: .2s; border-radius: 50%; }
    .switch input:checked + .slider { background-color: #111827; }
    .switch input:checked + .slider:before { transform: translateX(20px); }
    .lead-row { cursor: pointer; transition: background 0.12s; }
    .lead-row:hover { background: #f9fafb; }
    .lang-badge { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 7px; white-space: nowrap; background: #f3f4f6; color: #374151; }
    .preview-body { white-space: pre-wrap; font-family: 'Poppins', sans-serif; font-size: 13px; }
    #dropzone { border: 2px dashed #d1d5db; transition: border-color 0.2s; }
    #dropzone.drag-over { border-color: #06b6d4; background: #ecfeff; }
    .tpl-row { cursor: pointer; border-radius: 10px; padding: 10px 12px; transition: background 0.15s; border: 1px solid transparent; }
    .tpl-row:hover { background: #f0fdff; }
    .tpl-row.selected { background: #ecfeff; border-color: #06b6d4; }
    .date-new { color: #111827; font-weight: 700; }
  </style>
</head>

    // ‚îÄ‚îÄ‚îÄ LocalStorage templates ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    function loadTemplates() {
      const raw = localStorage.getItem('oos_templates_v2');
      if (raw) { try { return JSON.parse(raw); } catch(e) {} }
      const defaults = DEFAULT_TEMPLATES.map(t => Object.assign({}, t));
      localStorage.setItem('oos_templates_v2', JSON.stringify(defaults));
      return defaults;
    }
    function saveTemplates(tpls) { localStorage.setItem('oos_templates_v2', JSON.stringify(tpls)); }

    // ‚îÄ‚îÄ‚îÄ CSV ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    function parseCSVLine(line) {
      const result = []; let cur = ''; let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur); cur=''; }
        else cur += ch;
      }
      result.push(cur); return result;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseCSVLine(lines[0]);
      return lines.slice(1).filter(l => l.trim()).map(l => {
        const vals = parseCSVLine(l);
        const o = {};
        headers.forEach((h,i) => o[h.trim()] = (vals[i]||'').trim());
        return o;
      });
    }

    function processCSV(text) {
      const raw = parseCSV(text);
      leads = raw.map(r => ({
        store:            r['Store']||'',
        product:          r['Product Name']||'',
        sku:              r['Product SKU']||'',
        firstName:        r['First Name']||'',
        lastName:         r['Last Name']||'',
        email:            r['Email']||'',
        dateSubscribed:   r['Date Subscribed']||'',
        lastNotification: r['Last Notification']||'',
        status:           r['Status']||'',
        sendCount:        r['Send Count']||'0',
      }));
      // Newest first
      leads.sort((a,b) => new Date(b.dateSubscribed) - new Date(a.dateSubscribed));
      document.getElementById('dropzone').classList.add('hidden');
      document.getElementById('filters').classList.remove('hidden');
      renderLeads();
    }

    function handleFileUpload(evt) {
      const f = evt.target.files[0]; if (!f) return;
      const r = new FileReader(); r.onload = e => processCSV(e.target.result); r.readAsText(f);
    }
    function onDragOver(e) { e.preventDefault(); document.getElementById('dropzone').classList.add('drag-over'); }
    function onDragLeave()  { document.getElementById('dropzone').classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault(); document.getElementById('dropzone').classList.remove('drag-over');
      const f = e.dataTransfer.files[0]; if (!f) return;
      const r = new FileReader(); r.onload = ev => processCSV(ev.target.result); r.readAsText(f);
    }

    // ‚îÄ‚îÄ‚îÄ Render leads ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    function fmtDate(str) {
      if (!str) return '‚Äî';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('nl-NL', { day:'2-digit', month:'short', year:'numeric' });
    }

    function isRecent(str) {
      if (!str) return false;
      const d = new Date(str);
      const diffDays = (Date.now() - d) / 86400000;
      return diffDays <= 30;
    }

    function renderLeads() {
      const search = document.getElementById('searchInput').value.toLowerCase();

      const filtered = leads.filter(l => {
        if (!search) return true;
        const hay = [l.firstName,l.lastName,l.email,l.product,l.sku].join(' ').toLowerCase();
        return hay.includes(search);
      });

      document.getElementById('leadCount').textContent =
        `${filtered.length} leads${filtered.length !== leads.length ? ` van ${leads.length}` : ''}`;

      const container = document.getElementById('leadsContainer');
      if (!filtered.length) {
        container.innerHTML = `<div class="p-10 text-center text-gray-400 text-sm">Geen leads gevonden.</div>`;
        return;
      }

      container.innerHTML = `
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="px-4 py-3 text-left text-xs font-bold text-gray-400 uppercase">Datum</th>
              <th class="px-4 py-3 text-left text-xs font-bold text-gray-400 uppercase">Naam / Email</th>
              <th class="px-4 py-3 text-left text-xs font-bold text-gray-400 uppercase">Product</th>
              <th class="px-4 py-3 text-left text-xs font-bold text-gray-400 uppercase hidden md:table-cell">Taal</th>
              <th class="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>`;

      const tbody = document.getElementById('leadsBody');
      filtered.forEach(lead => {
        const name = [lead.firstName,lead.lastName].filter(Boolean).join(' ') || '‚Äî';
        const lang = LANG_CODE[lead.store] || lead.store;
        const flag = LANG_FLAGS[lead.store] || '';
        const dateStr = fmtDate(lead.dateSubscribed);
        const recent  = isRecent(lead.dateSubscribed);

        const tr = document.createElement('tr');
        tr.className = 'lead-row border-b border-gray-50';
        tr.innerHTML = `
          <td class="px-4 py-3 whitespace-nowrap">
            <span class="font-bold text-sm text-gray-900">${esc(dateStr)}</span>
            ${recent ? '<div class="text-xs font-semibold text-gray-400">nieuw</div>' : ''}
          </td>
          <td class="px-4 py-3">
            <div class="font-semibold text-gray-900">${esc(name)}</div>
            <div class="text-xs text-gray-400">${esc(lead.email||'‚Äî')}</div>
          </td>
          <td class="px-4 py-3 max-w-[260px]">
            <div class="font-medium text-gray-800 leading-tight">${esc(lead.product)}</div>
            <div class="text-xs text-gray-400 mt-0.5">SKU: ${esc(lead.sku)}</div>
          </td>
          <td class="px-4 py-3 hidden md:table-cell">
            <span class="lang-badge">${flag} ${lang}</span>
          </td>
          <td class="px-4 py-3 text-right whitespace-nowrap">
            <div class="flex items-center justify-end gap-2">
              <button title="Apple Mail draft" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-gray-900 hover:bg-gray-700 text-white rounded-lg text-xs font-bold apple-btn">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
                Mail
              </button>
              <button title="Meer opties" class="px-2 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-xs font-bold compose-btn">‚ãØ</button>
            </div>
          </td>`;
        tr.querySelector('.apple-btn').addEventListener('click', e => { e.stopPropagation(); quickSend(lead, 'apple'); });
        tr.querySelector('.compose-btn').addEventListener('click', e => { e.stopPropagation(); openCompose(lead); });
        tr.addEventListener('click', () => openCompose(lead));
        tbody.appendChild(tr);
      });
    }

    // ‚îÄ‚îÄ‚îÄ Compose ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    function openCompose(lead) {
      currentLead = lead;
      const name = [lead.firstName,lead.lastName].filter(Boolean).join(' ') || lead.email || '‚Äî';
      const flag = LANG_FLAGS[lead.store]||'';
      const lang = LANG_CODE[lead.store]||lead.store;

      document.getElementById('composeSubtitle').textContent = `${name} ‚Äì ${lead.product}`;
      document.getElementById('leadInfoStrip').innerHTML = `
        <div><span class="text-gray-400 text-xs font-bold block">Naam</span><span class="font-semibold text-gray-800">${esc(name)}</span></div>
        <div><span class="text-gray-400 text-xs font-bold block">Email</span><span class="font-semibold text-gray-800">${esc(lead.email||'‚Äî')}</span></div>
        <div><span class="text-gray-400 text-xs font-bold block">Product</span><span class="font-medium text-gray-700 text-xs leading-tight">${esc(lead.product)}</span></div>
        <div><span class="text-gray-400 text-xs font-bold block">Taal / Datum</span><span class="font-semibold text-gray-800">${flag} ${esc(lang)}</span><span class="text-xs text-gray-400 ml-2">${esc(fmtDate(lead.dateSubscribed))}</span></div>`;

      document.getElementById('alternatieven').value = '';

      const templates = loadTemplates();
      const select = document.getElementById('composeTemplateSelect');
      select.innerHTML = '';
      const matching = templates.filter(t => !t.lang || t.lang === lead.store);
      const others   = templates.filter(t =>  t.lang && t.lang !== lead.store);
      [...matching, ...others].forEach(t => {
        const idx = templates.indexOf(t);
        const o = document.createElement('option');
        o.value = idx;
        o.textContent = t.name;
        if (t.lang && t.lang !== lead.store) o.style.color = '#9ca3af';
        select.appendChild(o);
      });

      updateComposePreview();
      document.getElementById('composeModal').classList.remove('hidden');
    }

    function closeCompose() {
      document.getElementById('composeModal').classList.add('hidden');
      currentLead = null;
    }

    function getMerged() {
      if (!currentLead) return null;
      const templates = loadTemplates();
      const idx = parseInt(document.getElementById('composeTemplateSelect').value);
      const tpl = templates[idx]; if (!tpl) return null;
      const alts = document.getElementById('alternatieven').value.trim();
      const firstName = currentLead.firstName || currentLead.lastName || currentLead.email || '';
      const fullName  = [currentLead.firstName,currentLead.lastName].filter(Boolean).join(' ');
      const repl = {
        '{{FirstName}}': firstName,
        '{{Name}}': fullName || firstName,
        '{{Email}}': currentLead.email||'',
        '{{Product}}': currentLead.product||'',
        '{{SKU}}': currentLead.sku||'',
        '{{Store}}': currentLead.store||'',
        '{{DateSubscribed}}': fmtDate(currentLead.dateSubscribed),
        '{{Alternatieven}}': alts || '(vul alternatieven in)',
      };
      let subject = tpl.subject||'', body = tpl.body||'';
      Object.entries(repl).forEach(([k,v]) => { subject=subject.split(k).join(v); body=body.split(k).join(v); });
      return { subject, body, to: currentLead.email||'' };
    }

    function updateComposePreview() {
      const m = getMerged();
      const wrap = document.getElementById('composePreviewWrap');
      if (!m) { wrap.classList.add('hidden'); return; }
      wrap.classList.remove('hidden');
      document.getElementById('previewTo').textContent      = m.to;
      document.getElementById('previewSubject').textContent = m.subject;
      document.getElementById('previewBody').textContent    = m.body;
    }

    function quickSend(lead, type) {
      // Pick best matching template for this lead's language
      const templates = loadTemplates();
      const match = templates.find(t => !t.lang || t.lang === lead.store) || templates[0];
      if (!match) { alert('Geen templates gevonden. Maak er eerst een aan.'); return; }
      const idx = templates.indexOf(match);

      // Temporarily set currentLead so getMerged() works
      currentLead = lead;
      document.getElementById('composeTemplateSelect').innerHTML =
        `<option value="${idx}">${esc(match.name)}</option>`;
      document.getElementById('alternatieven').value = '';

      const m = getMerged();
      currentLead = null;
      if (!m) return;

      const to  = encodeURIComponent(m.to);
      const sub = encodeURIComponent(m.subject);
      const bod = encodeURIComponent(m.body);
      if (type === 'apple') {
        window.location.href = `mailto:${to}?subject=${sub}&body=${bod}`;
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(m.subject+'\n\n'+m.body)}`, '_blank');
      }
    }

    function doSend(type) {
      const m = getMerged();
      if (!m) { alert('Kies eerst een template'); return; }
      const to  = encodeURIComponent(m.to);
      const sub = encodeURIComponent(m.subject);
      const bod = encodeURIComponent(m.body);
      if (type === 'apple') {
        window.location.href = `mailto:${to}?subject=${sub}&body=${bod}`;
      } else if (type === 'gmail') {
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${sub}&body=${bod}`, '_blank');
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(m.subject+'\n\n'+m.body)}`, '_blank');
      }
    }

    // ‚îÄ‚îÄ‚îÄ Template manager ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
    function openTemplateManager() {
      renderPlaceholderChips(); renderTemplateList(); newTemplate();
      document.getElementById('templateModal').classList.remove('hidden');
    }
    function closeTemplateManager() { document.getElementById('templateModal').classList.add('hidden'); }

    function renderTemplateList() {
      const templates = loadTemplates();
      const panel = document.getElementById('templateListPanel');
      panel.innerHTML = '';
      if (!templates.length) { panel.innerHTML='<p class="text-sm text-gray-400">Nog geen templates.</p>'; return; }
      templates.forEach((t,i) => {
        const div = document.createElement('div');
        div.className = `tpl-row ${editingTplIndex===i?'selected':''}`;
        div.innerHTML = `<div class="font-bold text-gray-800 text-sm">${esc(t.name)}</div><div class="text-xs text-gray-400 mt-0.5 truncate">${esc(t.subject)}</div>`;
        div.addEventListener('click', () => loadTplIntoEditor(i));
        panel.appendChild(div);
      });
    }

    function loadTplIntoEditor(idx) {
      const t = loadTemplates()[idx]; if (!t) return;
      editingTplIndex = idx;
      document.getElementById('tplName').value    = t.name||'';
      document.getElementById('tplLang').value    = t.lang||'';
      document.getElementById('tplSubject').value = t.subject||'';
      document.getElementById('tplBody').value    = t.body||'';
      renderTemplateList();
    }

    function newTemplate() {
      editingTplIndex = null;
      ['tplName','tplSubject','tplBody'].forEach(id => document.getElementById(id).value='');
      document.getElementById('tplLang').value='';
      renderTemplateList();
    }

    function saveTemplate() {
      const name=document.getElementById('tplName').value.trim();
      const lang=document.getElementById('tplLang').value;
      const subject=document.getElementById('tplSubject').value.trim();
      const body=document.getElementById('tplBody').value;
      if (!name||!subject) { alert('Naam en onderwerp zijn verplicht'); return; }
      const templates = loadTemplates();
      const obj = { name, lang, subject, body };
      if (editingTplIndex!==null && editingTplIndex<templates.length) templates[editingTplIndex]=obj;
      else { templates.push(obj); editingTplIndex=templates.length-1; }
      saveTemplates(templates); renderTemplateList(); alert('Opgeslagen ‚úì');
    }

    function deleteTemplate() {
      if (editingTplIndex===null) return;
      if (!confirm('Template verwijderen?')) return;
      const templates = loadTemplates();
      templates.splice(editingTplIndex,1);
      saveTemplates(templates); newTemplate();
    }

    function renderPlaceholderChips() {
      const wrap = document.getElementById('placeholderChips'); wrap.innerHTML='';
      PLACEHOLDERS.forEach(p => {
        const btn=document.createElement('button'); btn.type='button';
        btn.className='placeholder-chip'; btn.textContent=p;
        btn.addEventListener('click', () => insertAtCursor('tplBody', p));
        wrap.appendChild(btn);
      });
    }

    function insertAtCursor(id, text) {
      const ta=document.getElementById(id); ta.focus();
      const s=ta.selectionStart||0, e=ta.selectionEnd||0;
      ta.value=ta.value.slice(0,s)+text+ta.value.slice(e);
      ta.selectionStart=ta.selectionEnd=s+text.length;
    }

    function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // init ‚Äî seed templates
    loadTemplates();
  </script>
